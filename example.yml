models:
  - name: orders
    description: "Fact table for customer orders"

    columns:
      - name: order_id
        description: "Primary key"
        data_type: int
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Foreign key to customers.customer_id"
        data_type: int
        tests:
          - not_null
          - relationships:
              to: ref('customers')
              field: customer_id